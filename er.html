document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Ysabeau';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"306da74d-8c0d-4382-a4d7-d9c38330f86c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Ysabeau';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"56d09612-19bb-4ef9-85d7-b961403bf318\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    :root{\n      /* TWEAK_DEFAULTS is read below */\n      --paper:#f4f1ea;          /* warm off-white, passport-like */\n      --paper-2:#ede8dc;\n      --ink:#0f0d0b;            /* warm near-black */\n      --ink-2:#26221e;          /* was light secondary — now near-black */\n      --ink-3:#3a342d;          /* was gray — now high-contrast */\n      --rule:#1a171466;         /* hairline */\n      --rule-2:#1a171426;\n      --emergency:#b4151a;      /* single emergency red */\n      --emergency-ink:#7a0d11;\n      --affirm:#00873d;         /* bright clinical green */\n      --affirm-ink:#00632c;\n      --affirm-bg:#d8f3e1;\n      --rx:#1e44c9;             /* royal blue — conditions & meds */\n      --rx-ink:#0f2a8a;\n      --rx-bg:#e3e9ff;\n\n      --mono: \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n      --sans: \"Ysabeau\", ui-sans-serif, system-ui, sans-serif;\n    }\n\n    *{box-sizing:border-box;margin:0;padding:0}\n    html,body{background:var(--paper);color:var(--ink);font-family:var(--sans)}\n    body{\n      min-height:100dvh;\n      font-size:17px;\n      line-height:1.35;\n      -webkit-font-smoothing:antialiased;\n      padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);\n      background:\n        repeating-linear-gradient(0deg, transparent 0 39px, var(--rule-2) 39px 40px),\n        var(--paper);\n    }\n\n    /* ————— Page container ————— */\n    .sheet{\n      max-width:720px;\n      margin:0 auto;\n      padding:0 0 40px;\n      background:var(--paper);\n      position:relative;\n    }\n    /* vertical margin rule removed */\n    .sheet::before{ content:none }\n\n    /* ————— Top band: SOS / DNR ————— */\n    .band{\n      background:var(--emergency);\n      color:#fff;\n      padding:14px 24px 16px;\n      display:flex;\n      align-items:center;\n      gap:18px;\n      border-bottom:3px double #ffffff55;\n    }\n    .band .cross{\n      flex:0 0 auto;\n      width:44px;height:44px;\n      display:grid;place-items:center;\n      border:2px solid #fff;\n      position:relative;\n    }\n    .band .cross::before,\n    .band .cross::after{\n      content:\"\";position:absolute;background:#fff;\n    }\n    .band .cross::before{width:22px;height:4px}\n    .band .cross::after{width:4px;height:22px}\n\n    .band .who{flex:1;min-width:0}\n    .band .who-label{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.22em;\n      text-transform:uppercase;\n      opacity:.85;\n      margin-bottom:2px;\n    }\n    .band .who-title{\n      font-family:var(--sans);\n      font-weight:800;\n      font-size:clamp(18px, 4.2vw, 22px);\n      letter-spacing:-0.01em;\n      line-height:1.05;\n    }\n    .band .who-sub{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.18em;\n      text-transform:uppercase;\n      opacity:1;\n      color:#fff;\n      margin-top:4px;\n    }\n\n    /* ————— DNR screamer ————— */\n    .dnr{\n      background:#fff;\n      border-bottom:1px solid var(--rule);\n      padding:22px 24px 24px;\n      display:grid;\n      grid-template-columns:auto 1fr;\n      gap:18px;\n      align-items:center;\n    }\n    .dnr .glyph{\n      width:64px;height:64px;\n      border-radius:50%;\n      border:3px solid var(--emergency);\n      color:var(--emergency);\n      display:grid;place-items:center;\n      font-family:var(--sans);\n      font-weight:800;\n      font-size:14px;\n      letter-spacing:.02em;\n      position:relative;\n      flex:0 0 auto;\n    }\n    .dnr .glyph::after{\n      content:\"\";\n      position:absolute;\n      inset:-3px;\n      border-radius:50%;\n      background:linear-gradient(45deg, transparent 47%, var(--emergency) 47% 53%, transparent 53%);\n    }\n    .dnr .glyph span{position:relative;z-index:1;background:#fff;padding:2px 4px}\n    .dnr h1{\n      font-size:clamp(26px, 6.2vw, 34px);\n      font-weight:800;\n      letter-spacing:-0.02em;\n      line-height:1;\n      color:var(--emergency);\n      margin-bottom:6px;\n    }\n    .dnr .tri{\n      font-family:var(--mono);\n      font-size:11px;\n      letter-spacing:.12em;\n      text-transform:uppercase;\n      color:var(--ink-2);\n      line-height:1.5;\n    }\n    .dnr .tri b{color:var(--ink);font-weight:700}\n\n    /* ————— Critical strip: blood, allergies, donor ————— */\n    .critical{\n      display:grid;\n      grid-template-columns:1fr 1fr 1fr;\n      border-bottom:1px solid var(--rule);\n      background:var(--paper-2);\n    }\n    .crit{\n      padding:18px 20px 20px;\n      border-right:1px solid var(--rule);\n      min-width:0;\n    }\n    .crit:last-child{border-right:none}\n    .crit .k{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.2em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n      margin-bottom:8px;\n    }\n    .crit .v{\n      font-family:var(--mono);\n      font-weight:700;\n      font-size:clamp(22px, 5.2vw, 30px);\n      letter-spacing:-0.01em;\n      color:var(--ink);\n      line-height:1;\n    }\n    .crit .v.sans{font-family:var(--sans);font-weight:700}\n    .crit .v.affirm{color:var(--affirm-ink)}\n\n    /* Donor critical cell — bright green emphasis */\n    .crit.donor-crit{\n      background:var(--affirm-bg);\n      border-left:4px solid var(--affirm);\n      position:relative;\n    }\n    .crit.donor-crit .k{color:var(--affirm-ink)}\n    .crit.donor-crit .v{color:var(--affirm-ink)}\n    .crit.donor-crit .sub{color:var(--affirm-ink);opacity:.85}\n    .crit .sub{\n      margin-top:6px;\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.14em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n      line-height:1.45;\n    }\n    @media (max-width:560px){\n      .critical{grid-template-columns:1fr 1fr}\n      .crit:nth-child(2){border-right:none}\n      .crit:nth-child(3){grid-column:1/-1;border-top:1px solid var(--rule);border-right:none}\n    }\n\n    /* ————— Identity: photo + data (passport feel) ————— */\n    .identity{\n      display:grid;\n      grid-template-columns:132px 1fr;\n      gap:20px;\n      padding:24px 24px 22px;\n      border-bottom:1px solid var(--rule);\n      background:var(--paper);\n      align-items:start;\n    }\n    .photo{\n      width:132px;\n      aspect-ratio:3/4;\n      background:\n        repeating-linear-gradient(45deg,#d9d3c4 0 6px,#cfc9ba 6px 12px);\n      border:1px solid var(--rule);\n      overflow:hidden;\n      position:relative;\n      flex:0 0 auto;\n    }\n    .photo img{\n      width:100%;height:100%;object-fit:cover;display:block;\n      filter:contrast(1.02) saturate(.95);\n    }\n    .photo::after{\n      content:\"PHOTO\";\n      position:absolute;\n      inset:auto 0 0 0;\n      padding:3px 6px;\n      font-family:var(--mono);\n      font-size:9px;\n      letter-spacing:.22em;\n      color:#fff;\n      background:#1a1714cc;\n      text-align:center;\n    }\n    .photo img:not([src=\"\"])+.caption,\n    .photo img{position:relative;z-index:1}\n\n    .idfields{display:grid;gap:14px;min-width:0}\n    .ageline{\n      display:flex;align-items:center;gap:14px;\n      padding-bottom:12px;\n      border-bottom:1px solid var(--rule);\n      flex-wrap:nowrap;\n    }\n    .ageline .sex{\n      width:clamp(44px, 10vw, 52px);\n      height:clamp(44px, 10vw, 52px);\n      border-radius:50%;\n      border:2.5px solid var(--ink);\n      color:var(--ink);\n      display:grid;place-items:center;\n      font-family:var(--sans);\n      font-weight:700;\n      font-size:clamp(26px, 6vw, 32px);\n      line-height:1;\n      flex:0 0 auto;\n    }\n    .ageline .age{\n      display:flex;align-items:baseline;gap:10px;\n      flex-wrap:wrap;\n      min-width:0;\n    }\n    .ageline .age .num{\n      font-family:var(--sans);\n      font-weight:800;\n      font-size:clamp(40px, 10vw, 56px);\n      line-height:.9;\n      letter-spacing:-0.03em;\n      color:var(--ink);\n    }\n    .ageline .age .unit{\n      font-family:var(--mono);\n      font-weight:600;\n      font-size:11px;\n      letter-spacing:.2em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n      line-height:1.4;\n    }\n    .idfields .row{display:grid;gap:2px;min-width:0}\n    .idfields .k{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.22em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n    }\n    .idfields .v{\n      font-family:var(--sans);\n      font-weight:700;\n      font-size:19px;\n      letter-spacing:-0.005em;\n      line-height:1.15;\n      color:var(--ink);\n      word-break:break-word;\n    }\n    .idfields .v.mono{font-family:var(--mono);font-weight:600;font-size:17px;letter-spacing:0}\n    .idfields .sub{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.14em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n    }\n\n    @media (max-width:560px){\n      .identity{grid-template-columns:112px 1fr;gap:16px;padding:20px 20px 18px}\n      .photo{width:112px}\n    }\n\n    /* ————— Clinical sections ————— */\n    .section{\n      padding:22px 24px 22px;\n      border-bottom:1px solid var(--rule);\n      background:var(--paper);\n    }\n    .section h2{\n      font-family:var(--mono);\n      font-size:11px;\n      font-weight:600;\n      letter-spacing:.26em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n      margin-bottom:14px;\n      display:flex;\n      align-items:baseline;\n      gap:10px;\n    }\n    .section h2::after{\n      content:\"\";flex:1;height:1px;background:var(--rule);\n    }\n\n    /* clinical table: condition / medication */\n    .rx{\n      display:grid;\n      gap:0;\n    }\n    .rx .line{\n      display:grid;\n      grid-template-columns:1fr;\n      gap:6px;\n      padding:14px 0;\n      border-top:1px dashed var(--rule);\n    }\n    .rx .line:first-child{border-top:none;padding-top:2px}\n    .rx .cond{\n      display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 12px;\n    }\n    .rx .cond .name{\n      font-size:21px;font-weight:700;letter-spacing:-0.01em;color:var(--ink);\n    }\n    .rx .cond .alt{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.14em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n    }\n    .rx .med{\n      display:grid;\n      grid-template-columns:auto 1fr;\n      gap:10px 14px;\n      align-items:baseline;\n      padding:8px 12px;\n      background:var(--paper-2);\n      border-left:3px solid var(--affirm);\n    }\n    .rx .med .tag{\n      font-family:var(--mono);\n      font-size:10px;\n      font-weight:600;\n      letter-spacing:.18em;\n      text-transform:uppercase;\n      color:var(--affirm-ink);\n    }\n    .rx .med .dose{\n      font-family:var(--mono);\n      font-size:15px;\n      font-weight:600;\n      color:var(--ink);\n      letter-spacing:0;\n    }\n    .rx .med .dose .brand{color:var(--ink-2);font-weight:500}\n\n    /* Rx section — subtle blue accent (left rule + heading only) */\n    .rx-section{\n      border-left:3px solid var(--rx);\n    }\n    .rx-section h2{color:var(--rx-ink)}\n    .rx-section h2::after{background:var(--rule)}\n    .rx-section .med{\n      border-left-color:var(--rx);\n    }\n    .rx-section .med .tag{color:var(--rx-ink)}\n\n    .donor-section{\n      background:var(--affirm-bg);\n      border-left:4px solid var(--affirm);\n    }\n    .donor-section h2{color:var(--affirm-ink)}\n    .donor-section h2::after{background:var(--affirm)}\n    .donor .statement{color:var(--affirm-ink)}\n    .donor .statement b{color:var(--affirm-ink);font-weight:800}\n    .donor .tri{color:var(--affirm-ink);opacity:.9}\n    .donor .reg{border-left-color:var(--affirm)}\n    .donor .reg .k{color:var(--affirm-ink)}\n    .donor .reg .v{color:var(--affirm-ink)}\n\n    /* donor block */\n    .donor{\n      display:grid;\n      grid-template-columns:1fr auto;\n      gap:16px;\n      align-items:end;\n    }\n    .donor .statement{\n      font-size:19px;\n      font-weight:600;\n      line-height:1.25;\n      letter-spacing:-0.005em;\n    }\n    .donor .statement b{color:var(--affirm-ink);font-weight:800}\n    .donor .tri{\n      margin-top:10px;\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.1em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n      line-height:1.7;\n    }\n    .donor .tri b{color:var(--affirm-ink);font-weight:700}\n    .donor .reg{\n      text-align:right;\n      border-left:1px solid var(--rule);\n      padding-left:16px;\n    }\n    .donor .reg .k{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.22em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n      margin-bottom:4px;\n    }\n    .donor .reg .v{\n      font-family:var(--mono);\n      font-weight:700;\n      font-size:22px;\n      color:var(--ink);\n      letter-spacing:.02em;\n    }\n    @media (max-width:560px){\n      .donor{grid-template-columns:1fr}\n      .donor .reg{text-align:left;border-left:none;padding-left:0;border-top:1px solid var(--rule);padding-top:10px}\n    }\n\n    /* legal/will alert */\n    .will{\n      display:grid;\n      grid-template-columns:auto 1fr;\n      gap:14px;\n      align-items:center;\n      padding:14px 16px;\n      background:#fff;\n      border:1px solid var(--rule);\n      border-left:3px solid var(--ink);\n    }\n    .will .seal{\n      width:40px;height:40px;border-radius:50%;\n      border:1.5px solid var(--ink);\n      display:grid;place-items:center;\n      font-family:var(--mono);font-size:10px;letter-spacing:.12em;\n      color:var(--ink);\n    }\n    .will .text{font-size:16px;line-height:1.3}\n    .will .text b{font-weight:700}\n    .will .tri{\n      margin-top:4px;\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.14em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n    }\n\n    /* ————— Footer / chain ————— */\n    .foot{\n      padding:20px 24px 4px;\n      display:grid;\n      gap:10px;\n    }\n    .foot .line{\n      display:flex;justify-content:space-between;gap:12px;\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.18em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n    }\n    .foot .legend{\n      font-family:var(--mono);\n      font-size:10px;\n      letter-spacing:.14em;\n      text-transform:uppercase;\n      color:var(--ink-3);\n      line-height:1.6;\n    }\n    .foot .legend b{color:var(--ink);font-weight:600}\n\n    /* small-caps helpers */\n    .sc{\n      font-family:var(--mono);\n      letter-spacing:.14em;\n      text-transform:uppercase;\n      font-size:10px;\n    }\n\n    /* ————— Tweaks panel ————— */\n    .tweaks{\n      position:fixed;\n      right:16px;bottom:16px;\n      width:280px;\n      background:#fff;\n      border:1px solid var(--rule);\n      box-shadow:0 12px 32px rgba(0,0,0,.12);\n      font-family:var(--sans);\n      font-size:14px;\n      z-index:50;\n      display:none;\n    }\n    .tweaks.open{display:block}\n    .tweaks header{\n      padding:10px 14px;\n      background:var(--ink);\n      color:#fff;\n      font-family:var(--mono);\n      font-size:11px;\n      letter-spacing:.2em;\n      text-transform:uppercase;\n      display:flex;justify-content:space-between;align-items:center;\n    }\n    .tweaks header button{\n      background:none;border:none;color:#fff;cursor:pointer;font-size:16px;\n    }\n    .tweaks .group{padding:12px 14px;border-bottom:1px solid var(--rule-2)}\n    .tweaks .group:last-child{border-bottom:none}\n    .tweaks .group .label{\n      font-family:var(--mono);\n      font-size:10px;letter-spacing:.2em;text-transform:uppercase;\n      color:var(--ink-3);margin-bottom:8px;\n    }\n    .tweaks .seg{display:flex;gap:4px}\n    .tweaks .seg button{\n      flex:1;padding:8px 6px;font-size:12px;\n      background:var(--paper);\n      border:1px solid var(--rule);\n      cursor:pointer;color:var(--ink);\n      font-family:var(--sans);\n    }\n    .tweaks .seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}\n\n    /* variants */\n    body[data-variant=\"mono\"]{\n      --paper:#ffffff;--paper-2:#f4f4f4;--ink:#0a0a0a;--ink-2:#1a1a1a;--ink-3:#2a2a2a;\n      --rule:#00000055;--rule-2:#00000026;\n      --emergency:#c10000;--emergency-ink:#8a0000;\n      --affirm:#007a35;--affirm-ink:#005826;--affirm-bg:#d3f0dd;\n      --rx:#1735b0;--rx-ink:#0a1e6e;--rx-bg:#dde4ff;\n    }\n    body[data-variant=\"mono\"]{\n      background:\n        repeating-linear-gradient(0deg, transparent 0 39px, var(--rule-2) 39px 40px),\n        var(--paper);\n    }\n    body[data-variant=\"dark\"]{\n      --paper:#121110;--paper-2:#1b1a18;--ink:#f4f1ea;--ink-2:#e4dfd4;--ink-3:#c8c2b6;\n      --rule:#f4f1ea55;--rule-2:#f4f1ea26;\n      --emergency:#ff4a50;--emergency-ink:#ffb0b3;\n      --affirm:#34d977;--affirm-ink:#6fe39a;--affirm-bg:#0f3a22;\n      --rx:#7fa0ff;--rx-ink:#b7c8ff;--rx-bg:#10183a;\n    }\n    body[data-variant=\"dark\"] .dnr{background:#1b1a18}\n    body[data-variant=\"dark\"] .dnr .glyph span{background:#1b1a18}\n    body[data-variant=\"dark\"] .will{background:#1b1a18}\n    body[data-variant=\"dark\"] .will .seal{border-color:var(--ink)}\n\n    body[data-density=\"compact\"] .band{padding:10px 20px 12px}\n    body[data-density=\"compact\"] .dnr{padding:16px 20px}\n    body[data-density=\"compact\"] .section{padding:16px 20px}\n    body[data-density=\"compact\"] .identity{padding:18px 20px}\n    body[data-density=\"compact\"] .crit{padding:14px 16px 16px}\n\n    /* print: clean single page */\n    @media print{\n      body{background:#fff;padding:0}\n      body::before{display:none}\n      .sheet{max-width:none}\n      .tweaks, .tweak-toggle{display:none !important}\n      .band{background:#fff;color:#000;border-bottom:2px solid #000}\n      .band .cross{border-color:#000}\n      .band .cross::before,.band .cross::after{background:#000}\n      .dnr h1{color:#000}\n      .dnr .glyph{border-color:#000;color:#000}\n      a{color:inherit}\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n\n<body data-variant=\"default\" data-density=\"comfortable\">\n  <main class=\"sheet\" aria-label=\"Tarjeta médica de emergencia\">\n\n    <!-- Top band -->\n    <header class=\"band\" role=\"banner\">\n      <div class=\"cross\" aria-hidden=\"true\"><\u002Fdiv>\n      <div class=\"who\">\n        <div class=\"who-title\">Tarjeta de emergencia<\u002Fdiv>\n        <div class=\"who-sub\">Emergency medical card · Carte médicale d'urgence<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- DNR screamer -->\n    <section class=\"dnr\" aria-label=\"Instrucción crítica de reanimación\">\n      <div class=\"glyph\" aria-hidden=\"true\"><span>DNR<\u002Fspan><\u002Fdiv>\n      <div>\n        <h1>No acepto RCP<\u002Fh1>\n        <div class=\"tri\">\n          Do not resuscitate · Ne pas réanimer\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Critical strip -->\n    <section class=\"critical\" aria-label=\"Datos críticos\">\n      <div class=\"crit\">\n        <div class=\"k\">Grupo sanguíneo<\u002Fdiv>\n        <div class=\"v\">O+<\u002Fdiv>\n        <div class=\"sub\">Blood type · Groupe sanguin<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"crit\">\n        <div class=\"k\">Alergias<\u002Fdiv>\n        <div class=\"v sans\" style=\"font-size:clamp(18px,4.4vw,24px)\">Ninguna conocida<\u002Fdiv>\n        <div class=\"sub\">No known allergies · Aucune allergie<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"crit donor-crit\">\n        <div class=\"k\">Donador de órganos<\u002Fdiv>\n        <div class=\"v sans affirm\" style=\"font-size:clamp(18px,4.4vw,24px)\">Sí · todos<\u002Fdiv>\n        <div class=\"sub\">Registered organ donor · Donneur d'organes enregistré<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Identity -->\n    <section class=\"identity\" aria-label=\"Identidad\">\n      <div class=\"photo\" aria-hidden=\"true\">\n        <img src=\"9853806f-6e63-4666-b9d8-b99ae39007e2\" alt=\"Fotografía del portador\" onerror=\"this.style.display='none'\">\n      <\u002Fdiv>\n      <div class=\"idfields\">\n        <div class=\"ageline\" aria-label=\"Sexo y edad\">\n          <div class=\"sex\" aria-label=\"Masculino\">♂<\u002Fdiv>\n          <div class=\"age\"><span class=\"num\" id=\"age-num\">—<\u002Fspan><span class=\"unit\">años · years · ans<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div class=\"k\">Nombre<\u002Fdiv>\n          <div class=\"v\">Francisco Angel Guadarrama Conzuelo<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div class=\"k\">Fecha de nacimiento<\u002Fdiv>\n          <div class=\"v\"><span class=\"mono\" style=\"font-family:var(--mono);font-weight:600\">1993-08-02<\u002Fspan><\u002Fdiv>\n          <div class=\"sub\">2 de agosto de 1993<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div class=\"k\">CURP<\u002Fdiv>\n          <div class=\"v mono\">GUCF930802HMCDNR04<\u002Fdiv>\n          <div class=\"sub\">Mexican unique population registry code · Code d'identité unique (Mexique)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div class=\"k\">Pasaporte<\u002Fdiv>\n          <div class=\"v mono\">N13487547<\u002Fdiv>\n          <div class=\"sub\">Passport · Passeport &nbsp;·&nbsp; MEX &nbsp;·&nbsp; exp. 04/2034<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Conditions & Medications -->\n    <section class=\"section rx-section\" aria-label=\"Condiciones y medicamentos\">\n      <h2>Condiciones y medicamentos<\u002Fh2>\n      <div class=\"rx\">\n        <div class=\"line\">\n          <div class=\"cond\">\n            <span class=\"name\">Hipotiroidismo<\u002Fspan>\n            <span class=\"alt\">Hypothyroidism · Hypothyroïdie<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"med\">\n            <span class=\"tag\">Rx<\u002Fspan>\n            <span class=\"dose\"><span class=\"brand\">Eutirox®<\u002Fspan> levotiroxina 50 mcg · VO · c/24 h<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"line\">\n          <div class=\"cond\">\n            <span class=\"name\">Dislipidemia mixta<\u002Fspan>\n            <span class=\"alt\">Mixed dyslipidemia · Dyslipidémie mixte<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"med\">\n            <span class=\"tag\">Rx<\u002Fspan>\n            <span class=\"dose\">Fenofibrato 100 mg · VO · c/24 h<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Donor -->\n    <section class=\"section donor-section\" aria-label=\"Donación de órganos\">\n      <h2>Donación de órganos<\u002Fh2>\n      <div class=\"donor\">\n        <div>\n          <div class=\"statement\">\n            Donador registrado de <b>todos los órganos, incluidas las córneas.<\u002Fb>\n          <\u002Fdiv>\n          <div class=\"tri\">\n            Información registrada en el <b>Centro Nacional de Trasplantes de México (CENATRA)<\u002Fb>.<br>\n            Registered with Mexico's National Transplant Center (CENATRA).<br>\n            Enregistré au Centre national des transplantations du Mexique (CENATRA).\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"reg\">\n          <div class=\"k\">CENATRA · Reg.<\u002Fdiv>\n          <div class=\"v\">109&nbsp;831<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Will / Legal -->\n    <section class=\"section\" aria-label=\"Voluntad anticipada\">\n      <h2>Voluntad anticipada<\u002Fh2>\n      <div class=\"will\">\n        <div class=\"seal\" aria-hidden=\"true\">TEST<\u002Fdiv>\n        <div class=\"text\">\n          <b>He otorgado testamento.<\u002Fb> Reafirmo mi voluntad de <b>no recibir RCP.<\u002Fb>\n          <div class=\"tri\">A will has been executed · Testament existant<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n\n  <\u002Fmain>\n\n  <!-- Tweaks panel -->\n  <div class=\"tweaks\" id=\"tweaks\">\n    <header>\n      <span>Tweaks<\u002Fspan>\n      <button onclick=\"document.getElementById('tweaks').classList.remove('open')\" aria-label=\"Close\">×<\u002Fbutton>\n    <\u002Fheader>\n    <div class=\"group\">\n      <div class=\"label\">Theme<\u002Fdiv>\n      <div class=\"seg\" data-key=\"variant\">\n        <button data-val=\"default\">Paper<\u002Fbutton>\n        <button data-val=\"mono\">B&amp;W<\u002Fbutton>\n        <button data-val=\"dark\">Dark<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"group\">\n      <div class=\"label\">Density<\u002Fdiv>\n      <div class=\"seg\" data-key=\"density\">\n        <button data-val=\"comfortable\">Comfortable<\u002Fbutton>\n        <button data-val=\"compact\">Compact<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n    // TWEAK_DEFAULTS\n    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n      \"variant\": \"mono\",\n      \"density\": \"comfortable\"\n    }/*EDITMODE-END*/;\n\n    // Apply defaults\n    document.body.dataset.variant = TWEAK_DEFAULTS.variant;\n    document.body.dataset.density = TWEAK_DEFAULTS.density;\n\n    // Age calculation from DOB 1993-08-02\n    (function(){\n      const dob = new Date(1993, 7, 2); // month 0-indexed: 7 = August\n      const now = new Date();\n      let age = now.getFullYear() - dob.getFullYear();\n      const m = now.getMonth() - dob.getMonth();\n      if (m < 0 || (m === 0 && now.getDate() < dob.getDate())) age--;\n      const el = document.getElementById('age-num');\n      if (el) el.textContent = age;\n    })();\n\n    // Mark \"on\" buttons\n    function syncButtons(){\n      document.querySelectorAll('.tweaks .seg').forEach(seg=>{\n        const key = seg.dataset.key;\n        const cur = document.body.dataset[key];\n        seg.querySelectorAll('button').forEach(b=>{\n          b.classList.toggle('on', b.dataset.val===cur);\n        });\n      });\n    }\n    syncButtons();\n\n    // Wire segmented controls\n    document.querySelectorAll('.tweaks .seg').forEach(seg=>{\n      const key = seg.dataset.key;\n      seg.querySelectorAll('button').forEach(b=>{\n        b.addEventListener('click', ()=>{\n          const val = b.dataset.val;\n          document.body.dataset[key] = val;\n          syncButtons();\n          try{\n            window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:val}}, '*');\n          }catch(e){}\n        });\n      });\n    });\n\n    // Edit-mode protocol — register first, then announce\n    window.addEventListener('message', (e)=>{\n      const d = e.data || {};\n      if (d.type === '__activate_edit_mode'){\n        document.getElementById('tweaks').classList.add('open');\n      } else if (d.type === '__deactivate_edit_mode'){\n        document.getElementById('tweaks').classList.remove('open');\n      }\n    });\n    try{ window.parent.postMessage({type:'__edit_mode_available'}, '*'); }catch(e){}\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
